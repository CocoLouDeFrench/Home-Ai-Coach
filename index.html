<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home AI Coach</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <meta name="theme-color" content="#111827" />
</head>
<body>
  <header>
    <div>
      <p class="eyebrow">PRIVATE TRAINER MODE</p>
      <h1>Home AI Coach</h1>
      <p class="subtitle">เทรนเนอร์ส่วนตัวสำหรับสร้างกล้ามที่บ้าน แบบประหยัดแต่ดูแพง</p>
    </div>
    <button id="installBtn" hidden>ติดตั้งแอป</button>
  </header>

  <main>
    <section class="card">
      <h2>วันนี้ร่างกายเป็นยังไง?</h2>
      <div class="grid">
        <label>พลังงานวันนี้
          <input id="energy" type="range" min="1" max="10" value="7" />
          <span id="energyVal">7/10</span>
        </label>
        <label>เวลาที่มี
          <select id="time">
            <option value="20">20 นาที</option>
            <option value="30" selected>30 นาที</option>
            <option value="45">45 นาที</option>
          </select>
        </label>
        <label>เป้าหมาย
          <select id="goal">
            <option value="muscle" selected>สร้างกล้าม</option>
            <option value="fatloss">ลดไขมัน</option>
            <option value="restart">กลับมาเริ่มใหม่</option>
          </select>
        </label>
      </div>
    </section>

    <section class="card">
      <h2>คะแนนความปวด</h2>
      <div class="pain-grid">
        <label>ขา <input data-muscle="legs" type="range" min="0" max="10" value="2"><span>2</span></label>
        <label>อก <input data-muscle="chest" type="range" min="0" max="10" value="2"><span>2</span></label>
        <label>หลัง <input data-muscle="back" type="range" min="0" max="10" value="2"><span>2</span></label>
        <label>ไหล่ <input data-muscle="shoulders" type="range" min="0" max="10" value="2"><span>2</span></label>
        <label>แกนกลาง <input data-muscle="core" type="range" min="0" max="10" value="2"><span>2</span></label>
      </div>
      <button id="generateBtn">ให้ AI Coach จัดโปรแกรมวันนี้</button>
    </section>

    <section class="coach card premium">
      <h2>AI Coach พูดตรงๆ</h2>
      <div id="coachText">กรอกสภาพร่างกาย แล้วกดปุ่มด้านบน</div>
    </section>

    <section class="card">
      <h2>Workout วันนี้</h2>
      <div id="workoutList" class="workout"></div>
      <button id="saveBtn">บันทึกว่าเล่นเสร็จแล้ว</button>
    </section>

    <section class="card">
      <h2>Progress</h2>
      <div class="stats">
        <div><strong id="streak">0</strong><span>day streak</span></div>
        <div><strong id="sessions">0</strong><span>sessions</span></div>
        <div><strong id="xp">0</strong><span>XP</span></div>
      </div>
      <div id="history"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
